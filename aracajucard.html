<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AracajuCard - GeoCODE</title>
  <link rel="stylesheet" href="global.css">
</head>

<body data-theme="financeiro">
  <header>
    <a href="./index.html" class="home-btn">← Home</a>
    <h1>🃏 AracajuCard</h1>
    <div style="width: 80px;"></div>
  </header>

  <main>
    <div class="container">
      <label for="valorPassagem">Valor da passagem (R$):</label>
      <input type="number" id="valorPassagem" step="0.01" placeholder="Ex: 4.50">

      <label for="valorDisponivel">Valor que você tem (R$):</label>
      <input type="number" id="valorDisponivel" step="0.01" placeholder="Ex: 20.00">

      <button onclick="calcular()">Calcular</button>

      <div class="resultado" id="resultado"></div>
    </div>
  </main>

  <footer>
    © 2025 Geovani Santos • Instagram: <a href="https://instagram.com/eusougeovani" target="_blank">@eusougeovani</a>
  </footer>

  <script>
    function calcular() {
      const valorPassagem = parseFloat(document.getElementById("valorPassagem").value);
      const valorDisponivel = parseFloat(document.getElementById("valorDisponivel").value);
      const resultadoDiv = document.getElementById("resultado");

      if (isNaN(valorPassagem) || isNaN(valorDisponivel) || valorPassagem <= 0 || valorDisponivel < 0) {
        resultadoDiv.innerHTML = "<p>Por favor, insira valores válidos.</p>";
        resultadoDiv.classList.add("show");
        return;
      }

      const quantidade = Math.floor(valorDisponivel / valorPassagem);
      const valorGasto = quantidade * valorPassagem;
      const sobra = valorDisponivel - valorGasto;

      resultadoDiv.innerHTML = `
        <p><strong>Passagens possíveis:</strong> ${quantidade}</p>
        <p><strong>Valor total gasto:</strong> R$ ${valorGasto.toFixed(2)}</p>
        <p><strong>Valor que sobra:</strong> R$ ${sobra.toFixed(2)}</p>
      `;
      resultadoDiv.classList.add("show");
    }

    // Permite calcular pressionando Enter
    document.getElementById("valorDisponivel").addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        calcular();
      }
    });
  </script>
</body>

</html>
