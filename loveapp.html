    <script>
        const imageContainer = document.getElementById('imageContainer');
        const sortearBtn = document.getElementById('sortearBtn');
        const placeholder = document.querySelector('.placeholder');

        // Pega todas as imagens da lista no HTML
        const imageList = document.getElementById('imageList');
        const images = Array.from(imageList.querySelectorAll('img')).map(img => img.src);

        sortearBtn.addEventListener('click', () => {
            // Desabilita o botão durante a animação
            sortearBtn.disabled = true;

            // Remove placeholder se existir
            if (placeholder) {
                placeholder.remove();
            }

            // Adiciona animação
            imageContainer.classList.add('spinning');

            // Após a animação, mostra a imagem sorteada
            setTimeout(() => {
                // Remove imagem anterior se houver
                const oldImg = imageContainer.querySelector('img.active');
                if (oldImg) {
                    oldImg.classList.remove('active');
                }

                // Sorteia uma imagem aleatória
                const randomIndex = Math.floor(Math.random() * images.length);
                const randomImage = images[randomIndex];

                // Cria nova imagem
                const img = document.createElement('img');
                img.src = randomImage;
                img.classList.add('active');
                imageContainer.appendChild(img);

                // Remove a animação
                imageContainer.classList.remove('spinning');

                // Reabilita o botão
                sortearBtn.disabled = false;
            }, 500);
        });
    </script>
