<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Mansão Diabólica - Ficha</title>
    <link rel="stylesheet" href="global.css">
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #cf000f;
            --text: #e0e0e0;
            --border: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin: 10px 0 20px 0;
            font-size: 1.8rem;
        }

        h2 {
            color: var(--primary);
            margin-top: 0;
            font-size: 1.3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Responsividade para Mobile */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            body {
                padding: 10px;
            }
        }

        .card {
            background-color: var(--surface);
            padding: 15px;
            border-radius: 12px; /* Bordas mais suaves para mobile */
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Área de Dados */
        .dice-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .dice-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background-color: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: opacity 0.2s;
            flex: 1;
            /* Melhoria de feedback tátil */
            touch-action: manipulation; 
        }

        .btn:active {
            opacity: 0.7;
            transform: scale(0.98);
        }

        .btn-small {
            padding: 0;
            font-size: 1.5rem;
            /* Tamanho mínimo recomendado para toque em telas mobile (44x44px) */
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: none;
        }

        #dice-result {
            font-size: 1.3rem;
            font-weight: bold;
            min-height: 30px;
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
        }

        /* Atributos */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Em telas extremamente pequenas, empilha os atributos */
        @media (max-width: 360px) {
            .stat-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-box {
            background: #2a2a2a;
            padding: 15px 10px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-title {
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .stat-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            width: 35px;
        }

        .stat-sub {
            font-size: 0.85rem;
            color: #aaa;
        }

        .stat-sub span {
            padding: 2px 5px;
            border-bottom: 1px dashed #666;
        }

        .stat-note {
            font-size: 0.7rem;
            color: #888;
            margin-top: 5px;
            line-height: 1.2;
        }

        .btn-generate {
            width: 100%;
            margin-top: 15px;
            background-color: #444;
        }

        /* Textareas */
        textarea {
            width: 100%;
            height: 150px;
            background: #2a2a2a;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            resize: vertical;
            font-family: inherit;
            font-size: 1rem;
        }

        /* Monstros */
        .input-group {
            display: flex;
            flex-wrap: wrap; /* Permite quebrar linha se não couber */
            gap: 8px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1 1 30%; /* Ocupa espaço flexível */
            min-width: 60px; /* Evita que o campo de força/perícia suma */
            padding: 12px 10px;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
        }

        .input-group input[id="monstro-nome"] {
            flex: 1 1 100%; /* Nome do monstro ocupa a linha toda no mobile se quebrar */
        }

        .input-group .btn {
            flex: 1 1 100%;
        }

        @media (min-width: 480px) {
            .input-group input[id="monstro-nome"] {
                flex: 2;
            }
            .input-group .btn {
                flex: 0.5;
            }
        }

        .monster-item {
            background: #2a2a2a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column; /* Empilha as informações no mobile */
            gap: 10px;
            border-left: 4px solid var(--primary);
        }

        .monster-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .monster-name {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .monster-stats {
            font-size: 0.9rem;
            color: #aaa;
            background: #1e1e1e;
            padding: 3px 8px;
            border-radius: 4px;
        }
        
        .monster-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e1e1e;
            padding: 8px;
            border-radius: 8px;
        }

        .monster-actions-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body data-theme="terror">

    <h1>A Mansão Diabólica</h1>

    <div class="container">
        
        <div class="column">
            <div class="card">
                <h2>Aventureiro</h2>
                
                <div class="dice-area">
                    <div class="dice-buttons">
                        <button class="btn" onclick="rolarDados(1)">1D6</button>
                        <button class="btn" onclick="rolarDados(2)">2D6</button>
                    </div>
                    <div id="dice-result">Toque nos botões para rolar</div>
                </div>

                <div class="stat-grid">
                    <div class="stat-box">
                        <div class="stat-title">Perícia</div>
                        <div class="stat-controls">
                            <button class="btn btn-small" onclick="alterarAtributo('pericia', -1)">-</button>
                            <span id="val-pericia" class="stat-value">0</span>
                            <button class="btn btn-small" onclick="alterarAtributo('pericia', 1)">+</button>
                        </div>
                        <div class="stat-sub">Inicial: <span id="max-pericia" contenteditable="true">0</span></div>
                        <div class="stat-note">(Partida: Inicial - 3)</div>
                    </div>

                    <div class="stat-box">
                        <div class="stat-title">Força</div>
                        <div class="stat-controls">
                            <button class="btn btn-small" onclick="alterarAtributo('forca', -1)">-</button>
                            <span id="val-forca" class="stat-value">0</span>
                            <button class="btn btn-small" onclick="alterarAtributo('forca', 1)">+</button>
                        </div>
                        <div class="stat-sub">Inicial: <span id="max-forca" contenteditable="true">0</span></div>
                    </div>

                    <div class="stat-box">
                        <div class="stat-title">Sorte</div>
                        <div class="stat-controls">
                            <button class="btn btn-small" onclick="alterarAtributo('sorte', -1)">-</button>
                            <span id="val-sorte" class="stat-value">0</span>
                            <button class="btn btn-small" onclick="alterarAtributo('sorte', 1)">+</button>
                        </div>
                        <div class="stat-sub">Inicial: <span id="max-sorte" contenteditable="true">0</span></div>
                    </div>

                    <div class="stat-box">
                        <div class="stat-title">Medo</div>
                        <div class="stat-controls">
                            <button class="btn btn-small" onclick="alterarAtributo('medo', -1)">-</button>
                            <span id="val-medo" class="stat-value">0</span>
                            <button class="btn btn-small" onclick="alterarAtributo('medo', 1)">+</button>
                        </div>
                        <div class="stat-sub">Máximo: <span id="max-medo" contenteditable="true">0</span></div>
                        <div class="stat-note">(Morte ao atingir o máximo)</div>
                    </div>
                </div>

                <button class="btn btn-generate" onclick="gerarAtributosIniciais()">Gerar Atributos Iniciais</button>
            </div>
            
            <div class="card" style="margin-top: 15px;">
                <h2>Equipamento e Armas</h2>
                <textarea id="equipamentos" placeholder="Anote aqui seus itens, armas e bônus adquiridos..."></textarea>
            </div>
        </div>

        <div class="column">
            <div class="card">
                <h2>Combate</h2>
                
                <div class="input-group">
                    <input type="text" id="monstro-nome" placeholder="Nome do Monstro">
                    <input type="number" id="monstro-pericia" placeholder="Perícia" pattern="[0-9]*" inputmode="numeric">
                    <input type="number" id="monstro-forca" placeholder="Força" pattern="[0-9]*" inputmode="numeric">
                    <button class="btn" onclick="adicionarMonstro()">Adicionar</button>
                </div>

                <div id="lista-monstros">
                    </div>
            </div>

            <div class="card" style="margin-top: 15px;">
                <h2>Notas & Mapa</h2>
                <textarea id="notas" placeholder="Anote senhas, dicas, caminhos mapeados e detalhes da exploração..." style="height: 250px;"></textarea>
            </div>
        </div>

    </div>

    <script>
        function rolar(qtd) {
            let total = 0;
            let rolagens = [];
            for(let i=0; i<qtd; i++) {
                let d = Math.floor(Math.random() * 6) + 1;
                total += d;
                rolagens.push(d);
            }
            return { total, rolagens };
        }

        function rolarDados(qtd) {
            const res = rolar(qtd);
            const text = qtd === 1 ? `🎲 ${res.total}` : `🎲 ${res.total} (${res.rolagens.join(' + ')})`;
            
            // Efeito visual rápido para indicar que rolou
            const display = document.getElementById('dice-result');
            display.style.opacity = '0.5';
            setTimeout(() => {
                display.innerText = text;
                display.style.opacity = '1';
            }, 100);
        }

        function alterarAtributo(attr, valor) {
            const el = document.getElementById(`val-${attr}`);
            let atual = parseInt(el.innerText) || 0;
            el.innerText = atual + valor;
        }

        function gerarAtributosIniciais() {
            if(!confirm("Gerar novos atributos apagará os atuais. Continuar?")) return;

            let perIni = rolar(1).total + 6;
            document.getElementById('max-pericia').innerText = perIni;
            document.getElementById('val-pericia').innerText = perIni - 3;

            let forIni = rolar(2).total + 12;
            document.getElementById('max-forca').innerText = forIni;
            document.getElementById('val-forca').innerText = forIni;

            let sorIni = rolar(1).total + 6;
            document.getElementById('max-sorte').innerText = sorIni;
            document.getElementById('val-sorte').innerText = sorIni;

            let medoMax = rolar(1).total + 6;
            document.getElementById('max-medo').innerText = medoMax;
            document.getElementById('val-medo').innerText = 0;

            document.getElementById('dice-result').innerText = "Ficha Pronta!";
        }

        let monsterIdCounter = 0;

        function adicionarMonstro() {
            const nome = document.getElementById('monstro-nome').value || "Criatura";
            const pericia = document.getElementById('monstro-pericia').value || 0;
            const forca = document.getElementById('monstro-forca').value || 0;

            if(forca == 0 && pericia == 0 && nome === "Criatura") return; 

            const id = `monster-${monsterIdCounter++}`;
            
            const html = `
                <div class="monster-item" id="${id}">
                    <div class="monster-info">
                        <span class="monster-name">${nome}</span>
                        <span class="monster-stats">PER: ${pericia}</span>
                    </div>
                    <div class="monster-actions">
                        <span style="font-size: 0.9rem; font-weight:bold;">FORÇA:</span>
                        <div class="monster-actions-controls">
                            <button class="btn btn-small" onclick="alterarForcaMonstro('${id}', -1)">-</button>
                            <span id="forca-${id}" class="stat-value" style="font-size: 1.4rem; text-align: center; width: 30px;">${forca}</span>
                            <button class="btn btn-small" onclick="alterarForcaMonstro('${id}', 1)">+</button>
                        </div>
                        <button class="btn btn-small" style="background-color: transparent; border: 1px solid var(--border); color: #aaa;" onclick="removerMonstro('${id}')">🗑️</button>
                    </div>
                </div>
            `;

            document.getElementById('lista-monstros').insertAdjacentHTML('afterbegin', html);
            
            document.getElementById('monstro-nome').value = '';
            document.getElementById('monstro-pericia').value = '';
            document.getElementById('monstro-forca').value = '';
        }

        function alterarForcaMonstro(id, valor) {
            const el = document.getElementById(`forca-${id}`);
            let atual = parseInt(el.innerText) || 0;
            el.innerText = atual + valor;
        }

        function removerMonstro(id) {
            document.getElementById(id).remove();
        }
    </script>
</body>
</html>
