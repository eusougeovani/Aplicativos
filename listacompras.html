<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Compras - GeoCODE</title>
  <link rel="stylesheet" href="global.css">
</head>

<body data-theme="ferramenta">
  <header>
    <a href="./index.html" class="home-btn">← Home</a>
    <h1>🛒 Lista de Compras</h1>
    <div style="width: 80px;"></div>
  </header>

  <main>
    <div class="container">
      <input type="text" id="produto" placeholder="Digite o nome do produto" />
      <button onclick="adicionarProduto()">Adicionar Produto</button>
      <div id="itens-lista"></div>
    </div>
  </main>

  <footer>
    © 2025 Geovani Santos • Instagram: <a href="https://instagram.com/eusougeovani" target="_blank">@eusougeovani</a>
  </footer>

  <script>
    let produtos = [];

    function atualizarLista() {
      const lista = document.getElementById("itens-lista");
      lista.innerHTML = "";
      produtos.forEach((produto, index) => {
        const div = document.createElement("div");
        div.className = "produto";
        div.innerHTML = `
          <strong>${produto.nome}</strong>
          <div class="controle">
            <button onclick="diminuirQuantidade(${index})">-</button>
            <span>${produto.quantidade}</span>
            <button onclick="aumentarQuantidade(${index})">+</button>
            <button onclick="removerProduto(${index})">×</button>
          </div>
        `;
        lista.appendChild(div);
      });
    }

    function adicionarProduto() {
      const nome = document.getElementById("produto").value.trim();
      if (nome) {
        const existente = produtos.find(p => p.nome.toLowerCase() === nome.toLowerCase());
        if (existente) {
          existente.quantidade++;
        } else {
          produtos.push({ nome, quantidade: 1 });
        }
        document.getElementById("produto").value = "";
        atualizarLista();
      }
    }

    function aumentarQuantidade(index) {
      produtos[index].quantidade++;
      atualizarLista();
    }

    function diminuirQuantidade(index) {
      produtos[index].quantidade--;
      if (produtos[index].quantidade <= 0) {
        removerProduto(index);
      } else {
        atualizarLista();
      }
    }

    function removerProduto(index) {
      produtos.splice(index, 1);
      atualizarLista();
    }

    // Permite adicionar produto pressionando Enter
    document.getElementById("produto").addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        adicionarProduto();
      }
    });
  </script>
</body>

</html>
