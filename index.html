<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoCODE Hub</title>
  <link rel="stylesheet" href="global.css">
  <meta name="description" content="Hub de mini WebApps desenvolvidos por GeoCODE Programmer">
  <meta name="theme-color" content="#667eea">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GeoCODE Hub">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="GeoCODE Hub">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png">
</head>

<body>

  <header>
    <h1>⚡ GeoCODE Hub</h1>
    <div class="header-right">
      <!-- Botão personalizado de instalação PWA -->
      <button id="install-btn" aria-label="Instalar aplicativo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Instalar App
      </button>
    </div>
  </header>

  <div class="container">
    <p class="section-title">Selecione um projeto para visualizar</p>
    <div class="projects-grid" id="projectsGrid"></div>
  </div>

  <footer>
    <p>&copy; <span id="anoAtual"></span> GeoCODE. Desenvolvido por
      <a href="https://eusougeovani.vercel.app/" target="_blank" rel="noopener">GeoCODE Programmer</a>
    </p>
  </footer>

  <!-- Toast de feedback pós-instalação -->
  <div id="install-toast" role="status" aria-live="polite">✅ App adicionado à tela inicial!</div>

  <script>
    // ─── Ano no footer ────────────────────────
    document.getElementById('anoAtual').textContent = new Date().getFullYear();

    // ─── Projetos ─────────────────────────────
    const projects = [
      { name: "Kama Sutra", url: "./loveapp.html", icon: "🔥" },
      { name: "Sorteador Loteria", url: "./sorteloteria.html", icon: "🎰" },
      { name: "Teste de Pureza", url: "./testepureza.html", icon: "📊" },
      { name: "AracajuCard", url: "./aracajucard.html", icon: "🚌" },
      { name: "GamePlay", url: "./gameplay.html", icon: "🎮" },
      { name: "Lista de Compras", url: "./listacompras.html", icon: "🛒" },
      { name: "Placar Eletrônico", url: "./placareletronico.html", icon: "🏆" },
      { name: "A Mansão Diabólica", url: "./mansao_diabolica.html", icon: "👹" },
    ];

    function renderProjects() {
      const grid = document.getElementById('projectsGrid');
      grid.innerHTML = '';
      projects.forEach(project => {
        const card = document.createElement('a');
        card.className = 'project-card';
        card.href = project.url;

        const icon = document.createElement('div');
        icon.className = 'project-icon';

        if (project.icon.startsWith('http') || project.icon.startsWith('./')) {
          const img = document.createElement('img');
          img.src = project.icon;
          img.alt = project.name;
          img.loading = 'lazy';
          icon.appendChild(img);
        } else {
          icon.textContent = project.icon;
        }

        const name = document.createElement('div');
        name.className = 'project-name';
        name.textContent = project.name;

        card.appendChild(icon);
        card.appendChild(name);
        grid.appendChild(card);
      });
    }

    renderProjects();

    // ══════════════════════════════════════════
    // PWA — Registro do Service Worker
    // Coloque este bloco sempre no final do HTML principal.
    // ══════════════════════════════════════════
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('./sw.js', { scope: './' })
          .then((registration) => {
            console.log('[PWA] Service Worker registrado com sucesso. Escopo:', registration.scope);

            // Verifica se há uma atualização disponível e notifica o usuário
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('[PWA] Nova versão disponível! Recarregue para atualizar.');
                  // Opcional: exibir um banner de "Nova versão disponível"
                }
              });
            });
          })
          .catch((err) => {
            console.error('[PWA] Falha ao registrar o Service Worker:', err);
          });
      });
    }

    // ══════════════════════════════════════════
    // PWA — Botão "Instalar App" personalizado
    // Captura o evento beforeinstallprompt para
    // exibir nosso próprio botão no momento certo.
    // ══════════════════════════════════════════
    let deferredPrompt = null;
    const installBtn = document.getElementById('install-btn');
    const installToast = document.getElementById('install-toast');

    // 1. Captura e segura o evento nativo (sem mostrar o prompt automaticamente)
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Torna o botão visível
      installBtn.classList.add('visible');
      console.log('[PWA] Pronto para instalar. Botão exibido.');
    });

    // 2. Ao clicar no nosso botão, dispara o prompt nativo
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('[PWA] Escolha do usuário:', outcome);

      if (outcome === 'accepted') {
        showToast();
      }

      // O prompt só pode ser usado uma vez — descarta a referência
      deferredPrompt = null;
      installBtn.classList.remove('visible');
    });

    // 3. Esconde o botão se o app já foi instalado
    window.addEventListener('appinstalled', () => {
      installBtn.classList.remove('visible');
      deferredPrompt = null;
      showToast();
      console.log('[PWA] App instalado com sucesso!');
    });

    function showToast() {
      installToast.classList.add('show');
      setTimeout(() => installToast.classList.remove('show'), 3500);
    }
  </script>

</body>

</html>
