<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placar Eletrônico - GeoCODE</title>
  <link rel="stylesheet" href="global.css">
</head>

<body data-theme="ferramenta">
  <header>
    <a href="./index.html" class="home-btn">← Home</a>
    <h1>🏆 Placar Eletrônico</h1>
    <div style="width: 80px;"></div>
  </header>

  <main>
    <div class="container">
      <div class="input-times">
        <input type="text" id="nomeA" placeholder="Nome do Time A">
        <input type="text" id="nomeB" placeholder="Nome do Time B">
        <br>
        <button onclick="iniciarPlacar()">Iniciar Placar</button>
      </div>

      <div class="placar" id="placarBox">
        <div class="time" id="timeA">
          <h2 id="labelA">Time A</h2>
          <div class="pontos" id="pontosA">0</div>
          <div class="botoes">
            <button onclick="alterarPontos('A', 1)">+1</button>
            <button onclick="alterarPontos('A', -1)">-1</button>
          </div>
        </div>
        <div class="time" id="timeB">
          <h2 id="labelB">Time B</h2>
          <div class="pontos" id="pontosB">0</div>
          <div class="botoes">
            <button onclick="alterarPontos('B', 1)">+1</button>
            <button onclick="alterarPontos('B', -1)">-1</button>
          </div>
        </div>
      </div>
      <button class="zerar-btn" onclick="zerarPlacar()">Zerar Placar</button>
    </div>
  </main>

  <footer>
    © 2025 Geovani Santos • Instagram: <a href="https://instagram.com/eusougeovani" target="_blank">@eusougeovani</a>
  </footer>

  <script>
    let placar = { A: 0, B: 0 };

    function iniciarPlacar() {
      const nomeA = document.getElementById("nomeA").value.trim();
      const nomeB = document.getElementById("nomeB").value.trim();

      if (nomeA && nomeB) {
        document.getElementById("labelA").textContent = nomeA;
        document.getElementById("labelB").textContent = nomeB;
        document.querySelector(".input-times").style.display = "none";
        document.getElementById("placarBox").style.display = "flex";
      } else {
        alert("Por favor, preencha o nome dos dois times.");
      }
    }

    function alterarPontos(time, valor) {
      placar[time] += valor;
      if (placar[time] < 0) placar[time] = 0;
      document.getElementById(`pontos${time}`).textContent = placar[time];
    }

    function zerarPlacar() {
      placar = { A: 0, B: 0 };
      document.getElementById("pontosA").textContent = 0;
      document.getElementById("pontosB").textContent = 0;
    }
  </script>
</body>

</html>
